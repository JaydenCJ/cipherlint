# A HAProxy edge with one hardened frontend and one legacy trap: the global
# options only say no-sslv3, so the `payments` bind silently re-opens
# TLS 1.0/1.1 — and the 1024-bit DH tune is Logjam bait.
global
    ssl-default-bind-ciphers ECDHE+AESGCM:ECDHE+CHACHA20
    ssl-default-bind-options no-sslv3
    tune.ssl.default-dh-param 1024

frontend www
    bind :443 ssl crt /etc/haproxy/www.pem ssl-min-ver TLSv1.2
    http-response set-header Strict-Transport-Security "max-age=63072000; includeSubDomains"
    default_backend app

frontend payments
    bind :8443 ssl crt /etc/haproxy/pay.pem
    default_backend app

backend app
    server app1 127.0.0.1:8080
