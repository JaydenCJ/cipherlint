# An Apache vhost that *looks* fine — until you notice SSLProtocol is never
# set, so httpd's default (`all -SSLv3`) quietly keeps TLS 1.0/1.1 enabled.
# cipherlint flags exactly that, and says the finding comes from a default.
<VirtualHost *:443>
    ServerName www.example.test
    SSLEngine on
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
</VirtualHost>
