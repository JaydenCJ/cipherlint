# A deliberately dated nginx TLS config — the kind that passed review in
# 2014 and never got touched again. `cipherlint lint examples/legacy-nginx.conf`
# finds every problem in it, offline, with citations.
http {
    ssl_stapling on;

    server {
        listen 443 ssl;
        server_name legacy.example.test;

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers 'HIGH:RC4-SHA:DES-CBC3-SHA:AES128-SHA:!aNULL';
        ssl_prefer_server_ciphers on;
        ssl_session_tickets on;

        add_header Strict-Transport-Security "max-age=300";
    }
}
